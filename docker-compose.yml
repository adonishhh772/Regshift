services:
  neo4j:
    image: neo4j:5-community
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: neo4j/regshift-dev-password-minimum-32-chars
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      DATA_DIR: /app/data
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: regshift-dev-password-minimum-32-chars
      NEO4J_ENABLED: "true"
      LLM_GATEWAY_ENABLED: "true"
      LLM_FALLBACK_TO_RULES: "true"
      LLM_ROUTE_CLASSIFY: "openai:gpt-4o-mini,gateway:gpt-4o-mini"
      LLM_ROUTE_CONTRACT: "openai:gpt-4o,gateway:gpt-4o"
      LLM_ROUTE_POLICY_INGEST: "openai:gpt-4o,gateway:gpt-4o"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-}
      LLM_GATEWAY_API_KEY: ${LLM_GATEWAY_API_KEY:-}
    depends_on:
      - neo4j

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  neo4j_data:
