# Minimal dev stack — fast startup, hot reload, Neo4j graph store, LangGraph orchestration.
# Usage: docker compose -f docker-compose.mini.yml up --build

services:
  neo4j:
    image: neo4j:5-community
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: neo4j/regshift-dev-password-minimum-32-chars
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    environment:
      DATA_DIR: /app/data
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: regshift-dev-password-minimum-32-chars
      NEO4J_ENABLED: "true"
      LANGFUSE_ENABLED: "true"
      LANGFUSE_PUBLIC_KEY: pk-lf-regshift-dev-public-key
      LANGFUSE_SECRET_KEY: sk-lf-regshift-dev-secret-key-min-32-chars
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_UI_URL: http://localhost:3001
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  neo4j_data:
